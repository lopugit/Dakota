<!-- @dsCard group="Brand" viewport="700x240" name="Voice" subtitle="Calm, plain-spoken, encouraging — never preachy" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 22px 28px; display: flex; flex-direction: column; gap: 12px; }
  .ex { display: flex; gap: 14px; align-items: baseline; }
  .ex b { font-size: var(--text-2xs); font-weight: 600; letter-spacing: var(--tracking-wide); text-transform: uppercase; width: 84px; flex: none; }
  .ex.yes b { color: var(--success); }
  .ex.no b { color: var(--danger); }
  .ex span { font-size: 14px; }
  .ex.no span { color: var(--text-muted); text-decoration: line-through; text-decoration-color: var(--text-faint); }
</style>
</head>
<body>
  <div class="ex yes"><b>Say</b><span>A little more yang than usual — grounding foods may help.</span></div>
  <div class="ex yes"><b>Say</b><span>Dinner logged. Your balance moved gently yang.</span></div>
  <div class="ex yes"><b>Say</b><span>Practice, not perfection.</span></div>
  <div class="ex no"><b>Not</b><span>Warning! Your diet is unbalanced!! 🚨</span></div>
  <div class="ex no"><b>Not</b><span>Crush your wellness goals 💪</span></div>
</body>
</html>
