<!-- @dsCard group="Colors" viewport="700x150" name="Semantic tones" subtitle="Mapped onto the chakra spectrum" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 20px; }
  .g { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .t { border-radius: var(--radius-md); padding: 14px; display: flex; flex-direction: column; gap: 4px; }
  .t b { font-size: 13px; font-weight: 600; }
  .t code { font-family: var(--font-mono); font-size: 10px; opacity: 0.75; }
</style>
</head>
<body>
  <div class="g">
    <div class="t" style="background: var(--success-soft); color: var(--success);"><b>Success</b><code>← heart</code></div>
    <div class="t" style="background: var(--warning-soft); color: var(--warning);"><b>Warning</b><code>← sacral</code></div>
    <div class="t" style="background: var(--danger-soft); color: var(--danger);"><b>Danger</b><code>← root</code></div>
    <div class="t" style="background: var(--info-soft); color: var(--info);"><b>Info</b><code>← throat</code></div>
  </div>
</body>
</html>
