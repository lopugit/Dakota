<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 32px 28px 24px; display: flex; flex-direction: column; gap: 14px; }
  .mark { font-size: 44px; line-height: 1; margin: 0; }
  .line { max-width: 300px; }
  .small { display: flex; align-items: baseline; gap: 20px; color: var(--text-secondary); }
  .small .mb-wordmark { font-size: 20px; }
  .small .mb-caps { letter-spacing: 0.12em; }
</style>
</head>
<body>
  <h1 class="mb-wordmark mark">Macrobiotica</h1>
  <div class="mb-spectrum line"></div>
  <div class="small"><span class="mb-wordmark">Macrobiotica</span><span class="mb-caps">App header size</span></div>
</body>
</html>
