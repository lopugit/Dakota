<!-- @dsCard group="Type" viewport="700x200" name="Display serif — Newsreader" subtitle="Headlines, dialog titles, quiet editorial moments" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 24px 28px; display: flex; flex-direction: column; gap: 10px; }
  .hero { font-family: var(--font-display); font-size: var(--text-4xl); font-weight: 400; line-height: var(--leading-tight); letter-spacing: var(--tracking-tight); margin: 0; }
  .hero em { font-weight: 300; }
  .row { display: flex; gap: 24px; align-items: baseline; font-family: var(--font-display); font-size: var(--text-lg); color: var(--text-secondary); }
  .row .it { font-style: italic; }
  .row .w3 { font-weight: 300; } .row .w5 { font-weight: 500; } .row .w6 { font-weight: 600; }
</style>
</head>
<body>
  <p class="hero">Balance, from the <em>inside</em> out.</p>
  <div class="row">
    <span class="w3">Light 300</span>
    <span>Regular 400</span>
    <span class="w5">Medium 500</span>
    <span class="w6">Semibold 600</span>
    <span class="it">Italic — for yin, yang &amp; asides</span>
  </div>
</body>
</html>
