<!-- @dsCard group="Brand" viewport="700x170" name="Iconography" subtitle="Lucide · 1.75px stroke · ink or muted, never multicolor" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 26px 28px; display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; gap: 22px; align-items: center; color: var(--text-secondary); }
  .row i { width: 22px; height: 22px; display: inline-flex; }
  .accent { color: var(--accent-strong); }
  .cap { font-size: 12px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <i data-lucide="wheat"></i>
    <i data-lucide="leaf"></i>
    <i data-lucide="soup"></i>
    <i data-lucide="carrot"></i>
    <i data-lucide="book-open"></i>
    <i data-lucide="heart"></i>
    <i data-lucide="sun"></i>
    <i data-lucide="moon"></i>
    <i data-lucide="sprout" class="accent"></i>
    <i data-lucide="flame"></i>
    <i data-lucide="droplets"></i>
    <i data-lucide="scale"></i>
  </div>
  <div class="cap">Functional icons take text color; the sprout may take the accent.</div>
  <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
  <script>lucide.createIcons({ attrs: { 'stroke-width': 1.75, width: 22, height: 22 } });</script>
</body>
</html>
