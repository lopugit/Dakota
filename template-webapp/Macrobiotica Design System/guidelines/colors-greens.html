<!-- @dsCard group="Colors" viewport="700x170" name="Accent greens" subtitle="green-300 is the accent · deeper steps for text & states" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 20px; }
  .ramp { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; }
  .s { display: flex; flex-direction: column; gap: 6px; }
  .s i { display: block; height: 64px; border-radius: 8px; border: 1px solid var(--border-subtle); position: relative; }
  .s i.hero::after { content: '●'; position: absolute; inset: 0; display: grid; place-content: center; color: var(--grey-900); font-size: 8px; }
  .s code { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); text-align: center; }
</style>
</head>
<body>
  <div class="ramp">
    <div class="s"><i style="background: var(--green-50);"></i><code>50</code></div>
    <div class="s"><i style="background: var(--green-100);"></i><code>100</code></div>
    <div class="s"><i style="background: var(--green-200);"></i><code>200</code></div>
    <div class="s"><i class="hero" style="background: var(--green-300);"></i><code>300 ★</code></div>
    <div class="s"><i style="background: var(--green-400);"></i><code>400</code></div>
    <div class="s"><i style="background: var(--green-500);"></i><code>500</code></div>
    <div class="s"><i style="background: var(--green-600);"></i><code>600</code></div>
    <div class="s"><i style="background: var(--green-700);"></i><code>700</code></div>
    <div class="s"><i style="background: var(--green-800);"></i><code>800</code></div>
    <div class="s"><i style="background: var(--green-900);"></i><code>900</code></div>
  </div>
</body>
</html>
