<!-- @dsCard group="Colors" viewport="700x170" name="Greyscale" subtitle="Faint leaf-grey warmth · the quiet 90% of every screen" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 20px; }
  .ramp { display: grid; grid-template-columns: repeat(12, 1fr); gap: 6px; }
  .s { display: flex; flex-direction: column; gap: 6px; }
  .s i { display: block; height: 64px; border-radius: 8px; border: 1px solid var(--border-subtle); }
  .s code { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); text-align: center; }
</style>
</head>
<body>
  <div class="ramp">
    <div class="s"><i style="background: var(--grey-0);"></i><code>0</code></div>
    <div class="s"><i style="background: var(--grey-50);"></i><code>50</code></div>
    <div class="s"><i style="background: var(--grey-100);"></i><code>100</code></div>
    <div class="s"><i style="background: var(--grey-200);"></i><code>200</code></div>
    <div class="s"><i style="background: var(--grey-300);"></i><code>300</code></div>
    <div class="s"><i style="background: var(--grey-400);"></i><code>400</code></div>
    <div class="s"><i style="background: var(--grey-500);"></i><code>500</code></div>
    <div class="s"><i style="background: var(--grey-600);"></i><code>600</code></div>
    <div class="s"><i style="background: var(--grey-700);"></i><code>700</code></div>
    <div class="s"><i style="background: var(--grey-800);"></i><code>800</code></div>
    <div class="s"><i style="background: var(--grey-900);"></i><code>900</code></div>
    <div class="s"><i style="background: var(--grey-950);"></i><code>950</code></div>
  </div>
</body>
</html>
