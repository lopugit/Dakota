<!-- @dsCard group="Spacing" viewport="700x260" name="Spacing scale" subtitle="4px base · --space-1 … --space-12" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 20px 28px; display: flex; flex-direction: column; gap: 7px; }
  .r { display: flex; align-items: center; gap: 14px; }
  .r code { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); width: 110px; flex: none; }
  .r i { display: block; height: 12px; border-radius: 3px; background: var(--accent); }
</style>
</head>
<body>
  <div class="r"><code>--space-1 · 4</code><i style="width: 4px;"></i></div>
  <div class="r"><code>--space-2 · 8</code><i style="width: 8px;"></i></div>
  <div class="r"><code>--space-3 · 12</code><i style="width: 12px;"></i></div>
  <div class="r"><code>--space-4 · 16</code><i style="width: 16px;"></i></div>
  <div class="r"><code>--space-5 · 20</code><i style="width: 20px;"></i></div>
  <div class="r"><code>--space-6 · 24</code><i style="width: 24px;"></i></div>
  <div class="r"><code>--space-7 · 32</code><i style="width: 32px;"></i></div>
  <div class="r"><code>--space-8 · 40</code><i style="width: 40px;"></i></div>
  <div class="r"><code>--space-9 · 48</code><i style="width: 48px;"></i></div>
  <div class="r"><code>--space-10 · 64</code><i style="width: 64px;"></i></div>
  <div class="r"><code>--space-12 · 96</code><i style="width: 96px;"></i></div>
</body>
</html>
