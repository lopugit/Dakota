<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="Dakota — the horse diary: arena training, GPS rides, health and care schedules, paddock rotation, and the riders around you." />
    <meta name="theme-color" content="#F6F1E7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#16110D" media="(prefers-color-scheme: dark)" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23AD7734' stroke-width='2.2' stroke-linecap='round'%3E%3Cpath d='M7 21C5.7 17.2 5 13.5 5 10c0-4.4 3-7 7-7s7 2.6 7 7c0 3.5-.7 7.2-2 11'/%3E%3Cpath d='M6.1 14h1.8'/%3E%3Cpath d='M16.1 14h1.8'/%3E%3Cpath d='M7.4 7.4l1.4 1'/%3E%3Cpath d='M16.6 7.4l-1.4 1'/%3E%3C/svg%3E" />
    <title>Dakota</title>
    <script>
      // Environment title prefix for at-a-glance tab management.
      // Production domains keep the clean title.
      (function () {
        var h = location.hostname;
        var prefix = '';
        if (h === 'localhost' || h === '127.0.0.1') prefix = '[LC] ';
        else if (/\.ts\.net$/.test(h)) prefix = '[TS] ';
        else if (/\.vercel\.app$/.test(h)) prefix = '[VC] ';
        if (prefix) document.title = prefix + document.title;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
